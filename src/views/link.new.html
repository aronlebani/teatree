{% extends "layout.html" %}

{% block content %}
  <form
    class="container full-screen-form"
		action="/profile/{{ profile.id }}/link"
    method="post"
  >
    <header>
			<h2>New link</h2>
    </header>
    <label for="title">Title</label>
    <input id="title" type="text" name="title" value="{{ link.title }}" required />
    <label for="href">URL</label>
    <input id="href" type="url" name="href" value="{{ link.href }}" required />
    <footer>
      <a href="/admin">Back</a>
      <button type="submit">Add</button>
    </footer>
  </form>
{% endblock content %}
